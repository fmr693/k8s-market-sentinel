# Universo de series — config-driven (brief: los tickers NUNCA van hardcodeados).
# En fase 3 este fichero se montará como ConfigMap; el código no cambia.

cef_credit: # CEFs de crédito — el universo principal a vigilar
  - WDI
  - KIO
  - BIT
  - HYT
  - BTZ
  - BHK
  - DSL
  - FSCO
  - BGH
  - ARDC
  - GHY
  - OPP
  - PDI
  - PDO
  - PTY

cef_contrast: # CEFs de contraste (alto ROC), para comparar comportamiento
  - BCAT
  - ECAT
  - ADX
  - BST

benchmarks: # Índices / FX / oro de referencia (sintaxis de Yahoo Finance)
  - ^GSPC
  - ^VIX
  - GLD
  - EURUSD=X
  - ^W5000 # Wilshire 5000: numerador del Buffett (WILL5000PR murió en FRED; decisión 2026-07-06)

stocks: # Acciones sueltas a vigilar (2026-07-07). SIN NAV: solo precio/variación,
  # nunca entran en el pipeline de descuento. Las europeas van vía su cotización
  # USA (ADR): así viven en el calendario XNYS del poller (una acción de París
  # cerraría a las 17:30 CET y solo se vería 2h/día) y todo queda en USD.
  # --- 10 mayores de EE.UU. por capitalización ---
  - NVDA
  - GOOGL
  - AAPL
  - MSFT
  - AMZN
  - META
  - AVGO
  - TSLA
  - BRK-B
  - JPM
  # --- 10 mayores de Europa, vía listing/ADR en USA ---
  - ASML # ASML (NL) — NASDAQ
  - SAP # SAP (DE) — NYSE
  - NVO # Novo Nordisk (DK) — NYSE
  - SHEL # Shell (UK) — NYSE
  - AZN # AstraZeneca (UK) — NASDAQ
  - NVS # Novartis (CH) — NYSE
  - RHHBY # Roche (CH) — ADR OTC
  - NSRGY # Nestlé (CH) — ADR OTC
  - LVMUY # LVMH (FR) — ADR OTC
  - SIEGY # Siemens (DE) — ADR OTC

fred_series: # Series macro de FRED (ingestor propio, no yfinance)
  - BAMLH0A0HYM2 # ICE BofA US High Yield OAS (diferencial de crédito HY)
  - DGS10 # Treasury a 10 años
  - GDP # PIB nominal trimestral (denominador del Buffett)

fx_pairs: # Tipos oficiales del BCE vía frankfurter.app (publicados ~16:00 CET, definitivos)
  # El EURUSD=X de yfinance es la cotización de mercado intradía; ESTE es el
  # fixing oficial diario — la banda 1,10–1,20 de las alertas se evalúa contra él.
  - EUR/USD

nav_check: # Cross-check del NAV (fase 10): CEF -> ticker de yfinance cuyo close ES el NAV.
  # Yahoo publica el NAV de los CEFs con el patrón X<TICKER>X (verificado en vivo:
  # XWDIX 14,19, XFSCX 7,13...). El NAV de gold.nav_crosscheck compara este proxy
  # con el de CEFConnect; si divergen >2%, cef_snapshot degrada nav_quality a
  # 'sospechoso' (la evidencia de FSCO del brief). Config-driven: corregir aquí.
  WDI: XWDIX
  KIO: XKIOX
  BIT: XBITX
  HYT: XHYTX
  BTZ: XBTZX
  BHK: XBHKX
  DSL: XDSLX
  FSCO: XFSCX
  BGH: XBGHX
  ARDC: XARDCX
  GHY: XGHYX
  OPP: XOPPX
  PDI: XPDIX
  PDO: XPDOX
  PTY: XPTYX
  BST: XBSTX
  ECAT: ECAT # rareza de la API: su NAVTicker es él mismo, no sigue el patrón X…X
  # BCAT y ADX omitidos: Yahoo no lista su NAV (XBCATX/XADXX → 404). Hueco
  # documentado (como otros de la fuente NAV); en el panel se ven sin cross-check.

defaults:
  # Si un ticker no tiene datos aún, el backfill arranca aquí.
  # ~10 años: suficiente para z-scores a 1 año con contexto de ciclo completo.
  price_history_start: "2015-01-01"
  # Días que re-pedimos por detrás del último dato al reanudar (over-fetch):
  # corrige la última vela si se guardó parcial y absorbe revisiones de Yahoo.
  overlap_days: 5
  # Solape para series FRED: mayor que el de precios porque FRED revisa
  # hacia atrás (el PIB se revisa meses después de publicarse).
  macro_overlap_days: 30
  # Cadencia del poller intradía (duda #4: config-driven, ~60-90s). Más
  # rápido no aporta (el dato de Yahoo ya llega ~15 min retrasado) y solo
  # gasta presupuesto de rate-limit y almacenamiento.
  poll_interval_seconds: 75
  # Tickers que se ingestan en DIARIO pero NO en intradía. ^W5000 (Wilshire)
  # no tiene velas 1m en Yahoo → cada tick del poller logueaba 2 líneas de
  # error por él. Su única función (numerador del Buffett) se calcula sobre
  # velas diarias, así que excluirlo del carril intradía no pierde nada.
  # Config-driven puro: añadir/quitar aquí, el código no cambia.
  intraday_exclude:
    - ^W5000
