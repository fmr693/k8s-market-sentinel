# CI de la fase 6 (decisiones #36-#38): dos jobs con papeles nítidos.
#
# - test: en CADA push y PR. La suite es 100% lógica pura (sin Postgres, sin
#   red): barata, rápida, sin servicios auxiliares que orquestar.
# - build-push: SOLO al empujar un tag v* (releases intencionadas, decisión
#   #37): construye la imagen, la somete a un smoke test y la publica en GHCR
#   como :X.Y.Z y :latest. Nada de build continuo en main: una imagen por
#   versión y GHCR limpio.
#
# Autenticación con el GITHUB_TOKEN que Actions provee solo (permissions:
# packages: write): sin PAT manual y sin el pipe de PowerShell que corrompía
# el token en la saga 0.4.0 — el problema desaparece de raíz.

name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # La MISMA versión de uv que generó el lock y que la imagen clava en su
      # COPY --from (decisión #36): si se actualiza, se actualiza en los dos.
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.30"

      # El mismo Python que la imagen de producción (python:3.13-slim)
      - name: Instalar Python 3.13
        run: uv python install 3.13

      # --locked: si pyproject.toml cambió sin regenerar el lock, el CI
      # revienta aquí (build roto > dependencias silenciosamente distintas)
      - name: Sincronizar dependencias (con extra dev)
        run: uv sync --locked --extra dev

      - name: Tests
        run: uv run --no-sync pytest

  build-push:
    # Solo tags v*, y siempre detrás de un test verde
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # el GITHUB_TOKEN puede escribir en GHCR (decisión #37)
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      # Guardia de coherencia (decisión #38): el tag vX.Y.Z debe coincidir
      # con la versión de pyproject.toml — se publica exactamente lo que el
      # repo dice ser, o no se publica nada.
      - name: Verificar que el tag coincide con pyproject.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(grep -Po '^version = "\K[^"]+' pyproject.toml)"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::el tag v$TAG_VERSION no coincide con pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker build clásico y explícito (BuildKit es el builder por defecto
      # del runner): sin capas de indirección que depurar a ciegas.
      - name: Build
        run: docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .

      # Smoke test ANTES del push (decisión #36): --help recorre todo el
      # árbol de imports (psycopg, pandas, exchange-calendars...) — si el
      # venv de la imagen está roto, muere aquí y GHCR no ve nada.
      - name: Smoke test
        run: docker run --rm "$IMAGE:$VERSION" --help

      - name: Push
        run: |
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
