# Punto de entrada del despliegue:  kubectl apply -k .   (desde la raíz)
#
# ¿Por qué en la raíz y no en deploy/k8s/? Porque kustomize, por seguridad,
# se niega a leer ficheros FUERA de su directorio (LoadRestrictionsRootOnly),
# y los generadores de abajo necesitan config/tickers.yaml. Desde la
# raíz, todo queda "debajo" y no hay que duplicar ficheros.
#
# Los generadores son la clave del diseño config-driven:
# - El ConfigMap del universo se GENERA desde config/tickers.yaml: una sola
#   fuente de verdad — editas el YAML, re-aplicas, y el ConfigMap se
#   actualiza. Nada de mantener dos copias sincronizadas a mano.
# - El Secret ya NO se genera desde .env (fase 7a, decisión #39): vive
#   CIFRADO en el repo (deploy/secrets/, SOPS+age — cierra la decisión #7).
#   Pre-ArgoCD se aplica con: sops -d deploy/secrets/<entorno>.yaml | kubectl apply -f -
#   Con ArgoCD (fase 7b), KSOPS lo descifra solo al sincronizar.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sentinel

resources:
  - deploy/k8s/namespace.yaml
  - deploy/k8s/cronjob-prices.yaml
  - deploy/k8s/cronjob-nav.yaml
  - deploy/k8s/cronjob-fx.yaml
  - deploy/k8s/cronjob-macro.yaml
  - deploy/k8s/cronjob-distributions.yaml
  - deploy/k8s/cronjob-check-quality.yaml
  - deploy/k8s/cronjob-nav-proxy.yaml
  - deploy/k8s/deployment-poller.yaml
  - deploy/k8s/grafana.yaml
  - deploy/k8s/prometheus.yaml
  - deploy/k8s/pushgateway.yaml

# Transformador de imagen: los manifests de deploy/k8s/ referencian el nombre
# neutro `sentinel:dev` (el que usa el flujo local con `k3d image import`);
# aquí se reescribe, en un único sitio, a la imagen publicada en GHCR que el
# k3s del Ubuntu SÍ puede descargar. Cambiar de versión = cambiar newTag.
images:
  - name: sentinel
    newName: ghcr.io/fmr693/k8s-market-sentinel
    newTag: "0.7.0"

# El PUSHGATEWAY_URL de los CronJobs (fase 9, commit 3) se inyecta AQUÍ, en un
# único sitio, para los 5 a la vez (mismo criterio DRY que el transformador de
# imagen de arriba): un patch que apunta a todo `kind: CronJob` y añade la env
# var a su contenedor. El poller (Deployment) NO lo recibe: usa pull (/metrics),
# no push. En un entorno sin este patch los ingestores no empujan y degradan
# solo (el push está gateado por la env, ausente = no-op).
patches:
  - target:
      kind: CronJob
    patch: |-
      - op: add
        path: /spec/jobTemplate/spec/template/spec/containers/0/env/-
        value:
          name: PUSHGATEWAY_URL
          value: http://pushgateway:9091

configMapGenerator:
  - name: sentinel-tickers
    files:
      - tickers.yaml=config/tickers.yaml
  # Checks de calidad de dato (fase 10): mismo patrón config-driven — la verdad
  # vive en config/quality_checks.yaml y el ConfigMap se genera desde ahí.
  - name: sentinel-quality-checks
    files:
      - config/quality_checks.yaml
  # Grafana aprovisionado como código (fase 5): mismos generadores, misma
  # filosofía — editar un dashboard = commit del JSON + kubectl apply -k .
  - name: grafana-provisioning-datasources
    files:
      - neon.yaml=deploy/grafana/datasource-neon.yaml
      - prometheus.yaml=deploy/grafana/datasource-prometheus.yaml
  - name: grafana-provisioning-dashboards
    files:
      - provider.yaml=deploy/grafana/dashboards-provider.yaml
  - name: grafana-dashboards
    files:
      - deploy/grafana/dashboards/cef-sentinel.json
      - deploy/grafana/dashboards/cef-charts.json
      - deploy/grafana/dashboards/pipeline-health.json
  # Config de Prometheus (fase 9): mismo patrón config-driven — la verdad vive
  # en deploy/prometheus/prometheus.yml y el ConfigMap se genera desde ahí.
  # Nombre estable (disableNameSuffixHash) → el volumen del Deployment lo
  # referencia como 'prometheus-config' sin adivinar sufijos.
  - name: prometheus-config
    files:
      - prometheus.yml=deploy/prometheus/prometheus.yml

generatorOptions:
  # Nombres estables (sin sufijo-hash): nuestros consumidores son Jobs que
  # nacen en cada ejecución y siempre leen la versión vigente — el rollout
  # automático que motiva el hash no aplica. Y job-migrate.yaml (fuera de
  # kustomize) puede referenciar 'sentinel-env' sin adivinar sufijos.
  disableNameSuffixHash: true
