# Generator de KSOPS: el eslabón que une SOPS con ArgoCD (fase 7b).
#
# Cuando el repo-server de ArgoCD ejecuta `kustomize build` sobre el overlay,
# este generator invoca el binario `ksops`, que descifra el fichero indicado
# con la clave age montada en el pod (Secret sops-age, env SOPS_AGE_KEY_FILE)
# y entrega el Secret de K8s en claro DIRECTAMENTE al motor de kustomize:
# el valor descifrado nunca pisa disco ni sale del repo-server.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: sentinel-secrets
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - ../../secrets/sentinel-env.local.yaml
