# Overlay GitOps del entorno LOCAL: SOLO el secreto descifrado (fase 7b).
#
# NO referencia la raíz. La raíz es ANCESTRO de este directorio y kustomize
# prohíbe que un overlay incluya un ancestro como base ("cycle detected") —
# y la raíz TIENE que vivir arriba por la decisión #17 (los generadores leen
# config/tickers.yaml). Por eso el despliegue se parte en DOS Applications de
# ArgoCD: 'sentinel-local' apunta a la raíz (la app, plugin-free, el mismo
# `kubectl apply -k .` de siempre) y 'sentinel-local-secrets' apunta AQUÍ
# (solo descifra el Secret con KSOPS, que exige los plugins de kustomize que
# solo el repo-server de ArgoCD tiene habilitados).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sentinel

generators:
  - ksops-secrets.yaml # descifra deploy/secrets/sentinel-env.local.yaml al sincronizar
