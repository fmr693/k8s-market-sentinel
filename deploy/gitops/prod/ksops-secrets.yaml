# Generator de KSOPS del entorno PROD (Neon).
#
# Espejo de deploy/gitops/local/ksops-secrets.yaml: el repo-server de ArgoCD
# ejecuta `ksops`, que descifra el fichero con la clave age montada (Secret
# sops-age, env SOPS_AGE_KEY_FILE) y entrega el Secret en claro directamente
# al motor de kustomize — el valor descifrado nunca pisa disco.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: sentinel-secrets-prod
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - ../../secrets/sentinel-env.prod.yaml
