# NAV-proxy de yfinance (fase 10): baja el NAV que Yahoo publica para cada CEF
# (ticker X…X) y lo guarda en silver.nav_proxy para el cross-check con CEFConnect.
# A las 23:20: después de precios (23:05) para no solapar peticiones a Yahoo, y
# ANTES del check de calidad (23:45) que lee gold.nav_crosscheck. Comparte las
# decisiones comunes de los CronJobs (documentadas en cronjob-prices.yaml).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingest-nav-proxy
  labels:
    app.kubernetes.io/part-of: k8s-market-sentinel
spec:
  schedule: "20 23 * * 1-5" # L-V 23:20, tras el cierre USA
  timeZone: "Europe/Madrid"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: k8s-market-sentinel
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
          containers:
            - name: ingest-nav-proxy
              image: sentinel:dev # kustomization lo reescribe a la imagen GHCR
              imagePullPolicy: IfNotPresent
              args: ["ingest-nav-proxy"]
              envFrom:
                - secretRef:
                    name: sentinel-env
              env:
                - name: TICKERS_FILE # el mapping nav_check vive en el universo
                  value: /config/tickers.yaml
              volumeMounts:
                - name: tickers
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi # pandas/yfinance tienen apetito
          volumes:
            - name: tickers
              configMap:
                name: sentinel-tickers # generado desde config/tickers.yaml
