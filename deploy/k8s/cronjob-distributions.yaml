# Carril lento #5: distribuciones de los CEFs (yfinance, actions=True).
# 23:15 — misma fuente que precios (23:05) con 10 min de separación para no
# solapar peticiones a Yahoo ni conexiones a Neon. Las distribuciones se
# anuncian con días de antelación y el ingestor lleva 30 días de solape:
# perder una ejecución es irrelevante, el backfill se pone al día solo.
# (Las decisiones comunes están comentadas en cronjob-prices.yaml.)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingest-distributions
  labels:
    app.kubernetes.io/part-of: k8s-market-sentinel
spec:
  schedule: "15 23 * * 1-5"
  timeZone: "Europe/Madrid"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: k8s-market-sentinel
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
          containers:
            - name: ingest-distributions
              image: sentinel:dev
              imagePullPolicy: IfNotPresent
              args: ["ingest-distributions"]
              envFrom:
                - secretRef:
                    name: sentinel-env
              env:
                - name: TICKERS_FILE
                  value: /config/tickers.yaml
              volumeMounts:
                - name: tickers
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: tickers
              configMap:
                name: sentinel-tickers
