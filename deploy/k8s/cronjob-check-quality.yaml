# Carril de calidad de dato (fase 10): corre los checks declarativos de
# config/quality_checks.yaml y escribe sus veredictos en gold.data_quality_results.
# Se programa DESPUÉS de las ingestas nocturnas (precios 23:05, distribuciones
# 23:15...): así mide la frescura cuando el dato ACABA de refrescarse — un check
# en 'warn'/'fail' señala una ingesta que no corrió, no un desfase esperado.
# Comparte las decisiones comunes de los CronJobs (timeZone, concurrencyPolicy
# Forbid, startingDeadlineSeconds, restartPolicy Never) documentadas en
# cronjob-prices.yaml.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: check-quality
  labels:
    app.kubernetes.io/part-of: k8s-market-sentinel
spec:
  schedule: "45 23 * * *" # a diario 23:45: registra también el estado del fin de semana
  timeZone: "Europe/Madrid"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300 # los checks son SELECTs rápidos
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: k8s-market-sentinel
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
          containers:
            - name: check-quality
              image: sentinel:dev # kustomization lo reescribe a la imagen GHCR
              imagePullPolicy: IfNotPresent
              args: ["check-quality"] # la "cara" del CLI que ejecuta este job
              envFrom:
                - secretRef:
                    name: sentinel-env # DATABASE_URL para escribir el resultado
              env:
                - name: QUALITY_CHECKS_FILE # el runner lee los checks del ConfigMap montado
                  value: /config/quality_checks.yaml
              volumeMounts:
                - name: quality-checks
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi # solo SELECTs + unos INSERTs: apetito mínimo
          volumes:
            - name: quality-checks
              configMap:
                name: sentinel-quality-checks # generado desde config/quality_checks.yaml
