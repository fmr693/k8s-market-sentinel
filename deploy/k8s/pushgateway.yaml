# Pushgateway (fase 9, commit 3): el buzón de métricas de los jobs BATCH.
#
# Los 5 CronJobs de ingesta viven MENOS que un scrape de Prometheus (nacen,
# ingieren, mueren en segundos) → no se pueden scrapear directo. Empujan sus
# métricas aquí al salir (patrón canónico avalado por los propios docs de
# Prometheus para jobs batch), y Prometheus scrapea al Pushgateway
# (honor_labels: true en prometheus.yml para conservar el label 'job' del pusher).
#
# SIN PVC a propósito: las métricas son efímeras y se re-empujan en cada
# ejecución del CronJob; si el pod muere se pierden hasta el siguiente push
# (aceptable para métricas batch). Contraste con Prometheus, cuya TSDB SÍ lleva
# PVC (el "trofeo stateful", #41). Corre como 'nobody' (65534), igual que prom/*.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  labels:
    app.kubernetes.io/name: pushgateway
    app.kubernetes.io/part-of: k8s-market-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pushgateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pushgateway
        app.kubernetes.io/part-of: k8s-market-sentinel
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # 'nobody', el usuario por defecto de prom/pushgateway
        runAsGroup: 65534
      containers:
        - name: pushgateway
          image: prom/pushgateway:v1.11.0 # línea estable; bump editando aquí
          ports:
            - containerPort: 9091
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9091
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
---
# ClusterIP: infra interna. Los CronJobs empujan a http://pushgateway:9091
# (env PUSHGATEWAY_URL, inyectada desde kustomization.yaml) y Prometheus lo
# scrapea por el mismo DNS. Su UI, si hace falta: kubectl port-forward.
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  labels:
    app.kubernetes.io/name: pushgateway
    app.kubernetes.io/part-of: k8s-market-sentinel
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pushgateway
  ports:
    - name: http
      port: 9091
      targetPort: 9091
