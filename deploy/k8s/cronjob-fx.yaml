# Carril lento #3: fixing oficial EUR/USD del BCE.
# 16:45 — el BCE publica ~16:00 CET; a las 16:45 ya está en frankfurter.
# (Las decisiones comunes están comentadas en cronjob-prices.yaml.)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingest-fx
  labels:
    app.kubernetes.io/part-of: k8s-market-sentinel
spec:
  schedule: "45 16 * * 1-5"
  timeZone: "Europe/Madrid"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: k8s-market-sentinel
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
          containers:
            - name: ingest-fx
              image: sentinel:dev
              imagePullPolicy: IfNotPresent
              args: ["ingest-fx"]
              envFrom:
                - secretRef:
                    name: sentinel-env
              env:
                - name: TICKERS_FILE
                  value: /config/tickers.yaml
              volumeMounts:
                - name: tickers
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: tickers
              configMap:
                name: sentinel-tickers
